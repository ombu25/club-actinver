<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actinver — Dashboard Dinámico Membresía Financiera</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Paleta institucional Actinver */
  --bg-deep:#0A0E14;
  --bg-mid:#0F1620;
  --bg-card:#141C2A;
  --bg-card-light:#1B2536;
  --azul-actinver:#314566;
  --line:rgba(255,255,255,0.07);
  --line-strong:rgba(255,255,255,0.12);
  --sunset:#C9A867;
  --sunset-soft:#8C7848;
  --text-pri:#FFFFFF;
  --text-sec:rgba(255,255,255,0.62);
  --text-mut:rgba(255,255,255,0.38);
  --good:#5EE6A0;
  --bad:#FF8B8B;
  --warn:#FFC85C;
}
html,body{
  background:var(--bg-deep);
  color:var(--text-pri);
  font-family:'Open Sans',sans-serif;
  min-height:100vh;
  font-size:13px;
  line-height:1.45;
  /* Gradiente radial sutil tipo presentación institucional */
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(49,69,102,0.18), transparent 60%),
    radial-gradient(ellipse 60% 80% at 100% 100%, rgba(49,69,102,0.10), transparent 60%);
  background-attachment:fixed;
}
.dash{padding:28px 36px;max-width:1400px;margin:0 auto}

/* HEADER — institucional, logo a la derecha */
.header{display:flex;align-items:center;gap:24px;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.header-text{flex:1}
.title-display{
  font-family:'Poppins',sans-serif;
  font-size:32px;
  font-weight:300;
  color:var(--text-pri);
  letter-spacing:1px;
  line-height:1.1;
}
.title-accent{font-weight:700}
.subtitle{
  font-family:'Poppins',sans-serif;
  font-size:10px;
  color:var(--text-mut);
  margin-top:8px;
  letter-spacing:3px;
  font-weight:500;
}
.brand-logo{
  height:42px;
  width:auto;
  opacity:0.95;
  flex-shrink:0;
}

/* CONTROLS */
.controls{
  display:flex;gap:12px;align-items:center;margin-bottom:24px;flex-wrap:wrap;
  background:var(--bg-card);
  border:1px solid var(--line);
  border-radius:4px;
  padding:14px 18px;
}
.ctrl-label{
  font-size:9.5px;color:var(--text-mut);text-transform:uppercase;letter-spacing:2.5px;
  font-family:'Poppins',sans-serif;font-weight:600;margin-right:6px;
}
.mode-tabs{display:flex;gap:0;background:var(--bg-deep);border:1px solid var(--line);border-radius:3px;padding:2px}
.mode-tab{
  padding:7px 16px;font-size:10.5px;font-family:'Poppins',sans-serif;font-weight:600;
  color:var(--text-mut);cursor:pointer;border-radius:2px;transition:all 0.2s;
  letter-spacing:1.5px;text-transform:uppercase;border:none;background:transparent;
}
.mode-tab.active{background:var(--sunset);color:var(--bg-deep)}
.mode-tab:hover:not(.active){color:var(--text-pri)}
.month-select{
  background:var(--bg-deep);border:1px solid var(--line);color:var(--text-pri);
  padding:7px 12px;border-radius:3px;font-family:'Open Sans',sans-serif;font-size:12px;
  cursor:pointer;font-weight:600;
}
.month-select:focus{outline:none;border-color:var(--sunset)}
.vs-text{font-family:'Poppins',sans-serif;font-size:10px;color:var(--sunset);font-weight:600;letter-spacing:2.5px;text-transform:uppercase}
.compare-controls{display:none;gap:12px;align-items:center}
.compare-controls.show{display:flex}
.single-controls{display:flex;gap:12px;align-items:center}
.single-controls.hide{display:none}
.partial-badge{
  background:rgba(255,200,92,0.10);border:1px solid var(--warn);color:var(--warn);
  padding:4px 11px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;
  letter-spacing:1.8px;border-radius:2px;text-transform:uppercase;display:none;white-space:nowrap;
}
.partial-badge.show{display:inline-block}

/* SECTION — títulos al estilo "TÍTULO DE SECCIÓN" */
.section{margin-bottom:32px}
.section-title{
  font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:var(--text-pri);
  text-transform:uppercase;letter-spacing:3.5px;margin-bottom:16px;
  display:flex;align-items:center;gap:14px;padding-bottom:10px;
  border-bottom:1px solid var(--line);
}
.section-num{
  color:var(--sunset);font-weight:700;font-size:11px;
  font-family:'JetBrains Mono',monospace;letter-spacing:0;
}
.section-title-accent{color:var(--sunset);font-weight:700}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:8px}
.kpi-card{
  background:var(--bg-card);border:1px solid var(--line);border-radius:4px;
  padding:16px 18px;position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;width:32px;height:1px;
  background:var(--sunset);
}
.kpi-label{
  font-size:9px;color:var(--text-mut);text-transform:uppercase;letter-spacing:2px;
  font-family:'Poppins',sans-serif;font-weight:600;margin-bottom:10px;line-height:1.3;
}
.kpi-value{
  font-size:30px;font-family:'Poppins',sans-serif;font-weight:300;
  color:var(--text-pri);line-height:1;letter-spacing:-0.5px;
}
.kpi-sub{
  font-size:10.5px;color:var(--text-sec);margin-top:8px;font-family:'Open Sans',sans-serif;
}

/* SPARKLINE */
.sparkline{height:26px;margin-top:10px;display:flex;align-items:flex-end;gap:3px}
.spark-bar{
  flex:1;background:rgba(201,168,103,0.20);border-radius:1px;
  transition:all 0.3s;position:relative;min-height:2px;
}
.spark-bar.current{background:var(--sunset)}
.spark-bar:hover{background:var(--sunset-soft)}
.spark-bar.current:hover{background:var(--text-pri)}
.spark-label{
  font-size:8px;color:var(--text-mut);font-family:'JetBrains Mono',monospace;
  text-align:center;margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;
}
.spark-wrap{display:flex;flex-direction:column;flex:1;align-items:center}

/* DELTA */
.delta{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;
  font-family:'JetBrains Mono',monospace;font-weight:600;margin-top:8px;
  padding:3px 8px;border-radius:2px;
}
.delta.up{background:rgba(94,230,160,0.10);color:var(--good)}
.delta.down{background:rgba(255,139,139,0.10);color:var(--bad)}
.delta.flat{background:rgba(255,255,255,0.05);color:var(--text-mut)}
.delta-arrow{font-size:8px}

/* SIDE BY SIDE */
.sxs-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sxs-col{
  background:var(--bg-card);border:1px solid var(--line);border-radius:4px;padding:18px;
}
.sxs-col-header{
  display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;
  padding-bottom:10px;border-bottom:1px solid var(--line);
}
.sxs-month{
  font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;
  color:var(--text-pri);text-transform:uppercase;letter-spacing:2px;
}
.sxs-month .accent{color:var(--sunset)}
.sxs-meta{font-size:10px;color:var(--text-mut);font-family:'JetBrains Mono',monospace}
.sxs-row{
  display:flex;justify-content:space-between;align-items:center;padding:8px 0;
  border-bottom:1px solid var(--line);font-size:12px;
}
.sxs-row:last-child{border-bottom:none}
.sxs-row-label{color:var(--text-sec);font-size:11px}
.sxs-row-value{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text-pri)}

/* PANEL */
.panel{
  background:var(--bg-card);border:1px solid var(--line);border-radius:4px;
  padding:18px 20px;margin-bottom:14px;
}
.panel-title{
  font-family:'Poppins',sans-serif;font-size:10.5px;font-weight:600;color:var(--text-pri);
  text-transform:uppercase;letter-spacing:2.5px;margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--line);
}
.panel-title .accent{color:var(--sunset);font-weight:700}

/* TABLE */
.kpi-table{width:100%;border-collapse:collapse;font-size:11.5px}
.kpi-table th{
  text-align:left;padding:9px 12px;background:var(--bg-deep);color:var(--sunset);
  font-family:'Poppins',sans-serif;font-size:9.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:1.8px;border-bottom:1px solid var(--line);
}
.kpi-table th.num{text-align:right}
.kpi-table td{padding:8px 12px;border-bottom:1px solid var(--line);color:var(--text-sec)}
.kpi-table td.num{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text-pri)}
.kpi-table tr:hover td{background:rgba(255,255,255,0.025)}
.kpi-table tr.totals td{
  background:rgba(201,168,103,0.05);font-weight:700;color:var(--text-pri);
  border-top:1px solid var(--line-strong);
}
.bar-bg{
  display:inline-block;width:60px;height:4px;background:rgba(255,255,255,0.06);
  border-radius:2px;vertical-align:middle;margin-right:8px;position:relative;overflow:hidden;
}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--sunset-soft),var(--sunset));border-radius:2px}

.tier-plus{color:#9DB8D6}
.tier-prime{color:var(--sunset)}

/* BADGES Plus/Prime */
.badge-plus{
  color:#fff;background:rgba(49,69,102,0.7);
  border:1px solid rgba(255,255,255,0.18);
  padding:2px 7px;border-radius:3px;font-size:9.5px;font-weight:700;
  font-family:'Poppins',sans-serif;letter-spacing:0.5px;
}
.badge-prime{
  color:var(--sunset);background:rgba(201,168,103,0.10);
  border:1px solid rgba(201,168,103,0.35);
  padding:2px 7px;border-radius:3px;font-size:9.5px;font-weight:700;
  font-family:'Poppins',sans-serif;letter-spacing:0.5px;
}

/* KPI second row (3 cols) */
.kpi-grid-3{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  max-width:75%;margin-bottom:8px;
}

/* LEGEND BAR */
.legend-bar{
  margin:14px 0 24px;padding:9px 14px;
  background:rgba(201,168,103,0.04);
  border:1px solid rgba(201,168,103,0.10);
  border-radius:3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.legend-label{
  font-size:9.5px;color:var(--text-mut);text-transform:uppercase;
  letter-spacing:2px;font-family:'Poppins',sans-serif;white-space:nowrap;
}
.legend-sep{width:1px;height:12px;background:rgba(201,168,103,0.2)}
.legend-tag{
  font-size:10.5px;color:var(--text-sec);
  background:rgba(255,255,255,0.04);
  padding:2px 9px;border-radius:2px;
}

/* DONUT */
.donut-wrap{position:relative;width:160px;height:160px;margin:8px auto 20px}
.donut-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;
}
.donut-num{
  font-family:'Poppins',sans-serif;font-size:30px;font-weight:300;
  color:var(--text-pri);line-height:1;
}
.donut-lbl{
  font-size:9px;color:var(--text-mut);text-transform:uppercase;
  letter-spacing:1.5px;margin-top:3px;font-family:'Poppins',sans-serif;
}
.donut-legend{
  display:flex;gap:36px;justify-content:center;
}
.donut-legend-item{text-align:center}
.donut-legend-dot{
  width:9px;height:9px;border-radius:50%;margin:0 auto 7px;
}
.donut-legend-num{
  font-family:'Poppins',sans-serif;font-size:24px;font-weight:300;color:var(--text-pri);
}
.donut-legend-lbl{font-size:10.5px;color:var(--text-mut);margin-top:3px}

/* BENEFIT BARS (uso de beneficios) */
.ben-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.ben-name{
  font-size:11.5px;color:var(--text-sec);min-width:140px;
  font-family:'Open Sans',sans-serif;
}
.ben-track{
  flex:1;height:14px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;
}
.ben-fill{height:100%;border-radius:2px;background:var(--sunset)}
.ben-count{
  font-size:11.5px;font-weight:700;color:var(--text-pri);
  font-family:'Poppins',sans-serif;min-width:22px;text-align:right;
}
.ben-pct{
  font-size:10.5px;color:var(--text-mut);
  font-family:'Poppins',sans-serif;min-width:42px;text-align:right;
}
.ben-zero{color:var(--text-mut);opacity:0.4}

/* BACK OFFICE bars (slim) */
.bo-bar-row{margin-bottom:14px}
.bo-bar-label{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:5px;font-size:11.5px;
}
.bo-bar-name{color:var(--text-sec);font-family:'Open Sans',sans-serif}
.bo-bar-pct{font-family:'Poppins',sans-serif;font-weight:700;font-size:12px}
.bo-track{
  height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;
}
.bo-fill-gold{height:100%;background:var(--sunset);border-radius:3px}
.bo-fill-green{height:100%;background:var(--good);border-radius:3px}

/* COMERCIAL grid (3 large pcts) */
.comercial-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
}
.comercial-item{
  text-align:center;padding:14px 8px;background:rgba(0,0,0,0.18);
  border:1px solid var(--line);border-radius:3px;
}
.comercial-val{
  font-family:'Poppins',sans-serif;font-size:28px;font-weight:300;
  color:var(--text-pri);line-height:1;
}
.comercial-lbl{
  font-size:10px;color:var(--text-mut);text-transform:uppercase;
  letter-spacing:1.5px;margin-top:6px;font-family:'Poppins',sans-serif;
}

/* SLA cards */
.sla-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:12px;
}
.sla-card{
  background:rgba(0,0,0,0.18);border:1px solid var(--line);
  border-radius:3px;padding:14px;
}
.sla-title{
  font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;
  color:var(--text-pri);margin-bottom:10px;letter-spacing:0.5px;
  min-height:30px;
}
.sla-row{
  display:flex;justify-content:space-between;font-size:11px;
  color:var(--text-sec);margin-bottom:4px;
}
.sla-row-val{font-family:'Poppins',sans-serif;font-weight:700}
.sla-track{
  height:5px;background:rgba(255,255,255,0.05);border-radius:2px;
  overflow:hidden;margin:6px 0 4px;
}
.sla-fill{height:100%;background:var(--sunset);border-radius:2px}
.sla-fill-good{background:var(--good)}
.sla-sublabel{
  font-size:10px;color:var(--text-mut);text-transform:uppercase;
  letter-spacing:1.2px;font-family:'Poppins',sans-serif;margin-top:6px;
}
.sla-badge{
  font-size:9.5px;font-weight:700;font-family:'Poppins',sans-serif;
  padding:3px 8px;border-radius:2px;margin-top:8px;display:inline-block;
  letter-spacing:0.5px;
}
.sla-badge-good{background:rgba(94,230,160,0.10);color:var(--good);border:1px solid rgba(94,230,160,0.3)}
.sla-badge-warn{background:rgba(255,200,92,0.10);color:var(--warn);border:1px solid rgba(255,200,92,0.3)}

/* EDAD chart */
.age-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:8px;
}
.age-row{
  display:grid;grid-template-columns:55px 1fr 30px;gap:12px;
  align-items:center;margin-bottom:9px;
}
.age-lbl{
  font-size:11px;color:var(--text-sec);font-family:'Poppins',sans-serif;font-weight:600;
}
.age-bars{
  display:flex;gap:2px;height:18px;align-items:center;
}
.age-plus{height:100%;background:var(--azul-actinver);border-radius:2px}
.age-prime{height:100%;background:rgba(201,168,103,0.7);border-radius:2px}
.age-total{
  font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;
  color:var(--text-pri);text-align:right;
}
.age-legend{
  display:flex;gap:20px;font-size:10.5px;color:var(--text-sec);margin-bottom:14px;
  font-family:'Poppins',sans-serif;
}
.age-legend-item{display:flex;align-items:center;gap:6px}
.age-legend-dot{width:9px;height:9px;border-radius:50%}
.age-footer{
  margin-top:16px;padding-top:14px;border-top:1px solid var(--line);
  display:flex;gap:32px;font-size:11px;color:var(--text-sec);flex-wrap:wrap;
  font-family:'Poppins',sans-serif;
}
.age-footer strong{color:var(--text-pri);font-weight:700}
.gold{color:var(--sunset);font-weight:700}

/* TWO COLUMN */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* FOOTER */
.footer{
  margin-top:36px;padding-top:18px;border-top:1px solid var(--line);
  font-size:10px;color:var(--text-mut);text-align:center;
  font-family:'Poppins',sans-serif;letter-spacing:1.5px;
}
.footer-note{color:var(--warn);margin-top:6px;font-size:10px;letter-spacing:1px}

/* BO LAYOUT (back office + activación comercial) */
.bo-layout{display:grid;grid-template-columns:1fr 1fr;gap:32px}

/* ============ RENTABILIDAD ============ */
.rent-layout{display:grid;grid-template-columns:1.1fr 1.4fr 1fr;gap:14px;margin-bottom:14px}

/* Hero card con UTOPE total */
.rent-hero{
  background:linear-gradient(145deg, rgba(201,168,103,0.08) 0%, rgba(20,28,42,1) 60%);
  border:1px solid rgba(201,168,103,0.25);
  border-radius:4px;padding:22px;
  display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;
}
.rent-hero::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,var(--sunset),transparent);
}
.rent-hero-label{
  font-size:9.5px;color:var(--text-mut);text-transform:uppercase;
  letter-spacing:2.5px;font-family:'Poppins',sans-serif;font-weight:600;
}
.rent-hero-val{
  font-family:'Poppins',sans-serif;font-size:40px;font-weight:300;
  color:var(--text-pri);line-height:1;margin:10px 0 8px;letter-spacing:-1px;
}
.rent-hero-sub{font-size:11px;color:var(--text-sec);margin-bottom:14px}
.rent-hero-delta{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(94,230,160,0.10);color:var(--good);
  padding:5px 10px;border-radius:3px;font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:700;border:1px solid rgba(94,230,160,0.25);
}
.rent-hero-margin{
  margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:baseline;
}
.rent-hero-margin-lbl{font-size:10px;color:var(--text-mut);text-transform:uppercase;letter-spacing:1.5px;font-family:'Poppins',sans-serif}
.rent-hero-margin-val{
  font-family:'Poppins',sans-serif;font-size:20px;font-weight:600;color:var(--sunset);
}

/* Cascada Ingreso → Gasto → UTOPE */
.rent-cascade{
  background:var(--bg-card);border:1px solid var(--line);border-radius:4px;padding:18px;
}
.rent-cascade-title{
  font-family:'Poppins',sans-serif;font-size:10.5px;font-weight:600;
  color:var(--text-pri);text-transform:uppercase;letter-spacing:2.5px;
  margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--line);
}
.rent-cascade-title .accent{color:var(--sunset);font-weight:700}
.cascade-row{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.cascade-lbl{
  font-size:11px;color:var(--text-sec);font-family:'Open Sans',sans-serif;
  min-width:82px;
}
.cascade-track{
  flex:1;height:22px;background:rgba(255,255,255,0.04);border-radius:2px;
  overflow:hidden;position:relative;
}
.cascade-fill{
  height:100%;border-radius:2px;display:flex;align-items:center;
  padding-right:8px;justify-content:flex-end;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;
}
.cascade-fill.ingreso{background:linear-gradient(90deg,#3a5170,var(--azul-actinver));color:#fff}
.cascade-fill.gasto{background:linear-gradient(90deg,rgba(255,139,139,0.25),rgba(255,139,139,0.5));color:#fff}
.cascade-fill.utope{background:linear-gradient(90deg,var(--sunset-soft),var(--sunset));color:var(--bg-deep)}
.cascade-val{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;
  color:var(--text-pri);min-width:85px;text-align:right;
}

/* Plus vs Prime tier card */
.rent-tiers{
  background:var(--bg-card);border:1px solid var(--line);border-radius:4px;padding:18px;
  display:flex;flex-direction:column;gap:12px;
}
.rent-tiers-title{
  font-family:'Poppins',sans-serif;font-size:10.5px;font-weight:600;
  color:var(--text-pri);text-transform:uppercase;letter-spacing:2.5px;
  margin-bottom:4px;padding-bottom:10px;border-bottom:1px solid var(--line);
}
.rent-tiers-title .accent{color:var(--sunset);font-weight:700}
.tier-card{
  padding:10px 12px;border-radius:3px;background:rgba(0,0,0,0.18);
  border:1px solid var(--line);
}
.tier-card.plus{border-left:3px solid var(--azul-actinver)}
.tier-card.prime{border-left:3px solid var(--sunset)}
.tier-card-head{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:6px;
}
.tier-card-name{
  font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
}
.tier-card.plus .tier-card-name{color:#9DB8D6}
.tier-card.prime .tier-card-name{color:var(--sunset)}
.tier-card-share{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-mut);font-weight:600;
}
.tier-card-utope{
  font-family:'Poppins',sans-serif;font-size:18px;font-weight:300;
  color:var(--text-pri);line-height:1;margin-bottom:6px;
}
.tier-card-meta{
  display:flex;justify-content:space-between;font-size:10px;
  color:var(--text-sec);font-family:'Poppins',sans-serif;
}
.tier-card-meta span strong{color:var(--text-pri);font-weight:700}

/* Tabla comparativa 2025 vs 2026 */
.rent-compare{
  background:var(--bg-card);border:1px solid var(--line);border-radius:4px;padding:4px;
}
.rent-compare-table{width:100%;border-collapse:collapse;font-size:11.5px}
.rent-compare-table th{
  text-align:left;padding:11px 14px;background:var(--bg-deep);color:var(--sunset);
  font-family:'Poppins',sans-serif;font-size:9.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:1.8px;border-bottom:1px solid var(--line);
}
.rent-compare-table th.num{text-align:right}
.rent-compare-table td{padding:9px 14px;border-bottom:1px solid var(--line);color:var(--text-sec)}
.rent-compare-table td.num{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text-pri)}
.rent-compare-table td.lbl{font-family:'Open Sans',sans-serif;color:var(--text-sec);font-weight:400}
.rent-compare-table tr.section-head td{
  background:rgba(201,168,103,0.05);font-family:'Poppins',sans-serif;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;
  color:var(--sunset);padding:8px 14px;border-top:1px solid var(--line);border-bottom:1px solid var(--line-strong);
}
.rent-compare-table tr.totals td{
  background:rgba(201,168,103,0.07);color:var(--text-pri);font-weight:700;
  border-top:1px solid var(--line-strong);
}
.delta-up{color:var(--good) !important;font-weight:700}
.delta-down{color:var(--bad) !important;font-weight:700}
.delta-flat{color:var(--text-mut) !important}

.rent-note{
  margin-top:10px;padding:10px 12px;
  background:rgba(255,200,92,0.04);border:1px solid rgba(255,200,92,0.15);
  border-radius:3px;font-size:10.5px;color:var(--text-sec);
  font-family:'Open Sans',sans-serif;line-height:1.5;
}
.rent-note strong{color:var(--warn);font-weight:700}

/* RESPONSIVE */
@media (max-width: 1100px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .sxs-grid,.two-col{grid-template-columns:1fr}
  .title-display{font-size:24px}
  .sla-grid{grid-template-columns:repeat(3,1fr)}
}
@media (max-width: 900px){
  .kpi-grid-3{max-width:100%;grid-template-columns:repeat(3,1fr)}
  .sla-grid{grid-template-columns:repeat(2,1fr)}
  .bo-layout{grid-template-columns:1fr;gap:22px}
  .rent-layout{grid-template-columns:1fr;gap:12px}
}
@media (max-width: 700px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .kpi-grid-3{grid-template-columns:repeat(2,1fr)}
  .age-grid{grid-template-columns:1fr;gap:0}
}
@media (max-width: 560px){
  .dash{padding:16px 12px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
  .kpi-grid-3{grid-template-columns:1fr 1fr;gap:8px}
  .kpi-card{padding:12px 13px}
  .kpi-value{font-size:24px}
  .kpi-label{font-size:8.5px;letter-spacing:1.5px}
  .kpi-sub{font-size:10px}
  .brand-logo{height:32px}
  .title-display{font-size:20px;letter-spacing:0.5px}
  .subtitle{font-size:8.5px;letter-spacing:2px}
  .header{gap:12px;margin-bottom:18px}
  .controls{padding:10px 12px;gap:8px}
  .mode-tab{padding:6px 10px;font-size:9.5px;letter-spacing:0.8px}
  .month-select{padding:6px 8px;font-size:11px}
  .section{margin-bottom:22px}
  .section-title{font-size:10px;letter-spacing:2px;gap:8px}
  .panel{padding:14px 14px}
  /* SLA: 1 por fila en móvil */
  .sla-grid{grid-template-columns:1fr;gap:10px}
  /* Activación comercial: 1 card por fila */
  .comercial-grid{grid-template-columns:1fr;gap:8px}
  .comercial-val{font-size:22px}
  /* Benefit bars */
  .ben-name{min-width:100px;font-size:10.5px}
  .ben-count{font-size:10.5px}
  .ben-pct{font-size:9.5px;min-width:36px}
  /* Onboarding inline items */
  .panel-title{font-size:10px;letter-spacing:1.8px}
  /* Tabla asesores (por si vuelve) */
  .kpi-table th,.kpi-table td{padding:6px 8px;font-size:10.5px}
  .kpi-table th{font-size:8.5px;letter-spacing:1px}
  /* Age */
  .age-row{grid-template-columns:44px 1fr 26px;gap:8px}
  .age-lbl{font-size:10px}
  .age-total{font-size:11px}
  /* Legend bar horizontal scroll */
  .legend-bar{overflow-x:auto;padding:8px 10px}
  .legend-tag{font-size:9.5px;padding:2px 7px;white-space:nowrap}
  /* Donut */
  .donut-wrap{width:130px;height:130px}
  .donut-num{font-size:26px}
  .donut-legend{gap:24px}
  .donut-legend-num{font-size:20px}
  /* Footer */
  .footer{font-size:9px;letter-spacing:1px}
  /* Rentabilidad */
  .rent-hero-val{font-size:30px}
  .rent-hero{padding:16px}
  .rent-cascade,.rent-tiers{padding:14px}
  .tier-card-utope{font-size:16px}
  .rent-compare-table th,.rent-compare-table td{padding:7px 10px;font-size:10.5px}
  .cascade-lbl{min-width:70px;font-size:10px}
  .cascade-val{min-width:70px;font-size:10.5px}
}
@media (max-width: 400px){
  .kpi-grid,.kpi-grid-3{grid-template-columns:1fr}
  .mode-tabs{flex-wrap:wrap}
  .mode-tab{flex:1;min-width:0}
}

/* FADE */
.fade{animation:fade 0.35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

// ==================== HELPERS ====================
const fmt = {
  n: v => Number(v||0).toLocaleString('es-MX'),
  $: v => '$' + Math.round(v||0).toLocaleString('es-MX'),
  pct: v => (v*100).toFixed(1) + '%',
  pct0: v => Math.round(v*100) + '%',
  dec: v => Number(v||0).toFixed(2),
};

function pct(num, den){ return den ? num/den : 0; }

function delta(curr, prev){
  if(prev === 0 || prev == null) return {val:null, pct:null, dir:'flat'};
  const d = curr - prev;
  const p = prev !== 0 ? d/prev : 0;
  return {val:d, pct:p, dir: d>0?'up' : d<0?'down':'flat'};
}

function deltaHTML(curr, prev, isPct=false, isCurrency=false){
  const d = delta(curr, prev);
  if(d.dir === 'flat' || d.val === null) return '<span class="delta flat"><span class="delta-arrow">●</span> 0</span>';
  const arrow = d.dir === 'up' ? '▲' : '▼';
  const sign = d.val > 0 ? '+' : '';
  let valStr;
  if(isPct) valStr = sign + (d.val*100).toFixed(1) + 'pp';
  else if(isCurrency) valStr = sign + '$' + Math.abs(Math.round(d.val)).toLocaleString('es-MX');
  else valStr = sign + d.val;
  const pctStr = ' (' + sign + (d.pct*100).toFixed(1) + '%)';
  return `<span class="delta ${d.dir}"><span class="delta-arrow">${arrow}</span> ${valStr}${pctStr}</span>`;
}

function sparkline(values, currentIdx){
  const max = Math.max(...values, 1);
  return '<div class="sparkline">' + values.map((v,i)=>{
    const h = Math.max(2, (v/max)*22);
    const cls = i === currentIdx ? 'spark-bar current' : 'spark-bar';
    return `<div class="spark-wrap"><div class="${cls}" style="height:${h}px" title="${MONTH_LABEL[MONTHS[i]]}: ${v}"></div><div class="spark-label">${MONTH_SHORT[MONTHS[i]]}</div></div>`;
  }).join('') + '</div>';
}

function renderKPICard(k, idx){
  let valStr;
  if(k.format === '$') valStr = fmt.$(k.value);
  else if(k.format === 'pct') valStr = fmt.pct(k.value);
  else if(k.format === 'pct0') valStr = fmt.pct0(k.value);
  else if(k.format === 'dec') valStr = fmt.dec(k.value);
  else valStr = fmt.n(k.value);
  const trend = trendValues(k.path);
  const subContent = k.subHTML ? k.subHTML : (k.sub || '');
  return `<div class="kpi-card">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-value">${valStr}</div>
    <div class="kpi-sub">${subContent}</div>
    ${sparkline(trend, idx)}
  </div>`;
}

function renderDonut(d){

  const pPlus = d.plus / total;
  const pPrime = d.prime / total;
  const C = 2 * Math.PI * 62; // circunferencia
  const dashPrime = (pPrime * C).toFixed(1);
  const dashPlus = (pPlus * C).toFixed(1);
  const offsetPlus = (-pPrime * C).toFixed(1);

  return `<div class="panel">
    <div class="panel-title">DISTRIBUCIÓN POR <span class="accent">NIVEL</span></div>
    <div class="donut-wrap">
      <svg viewBox="0 0 160 160" width="160" height="160">
        <circle cx="80" cy="80" r="62" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="22"/>
        <circle cx="80" cy="80" r="62" fill="none" stroke="var(--sunset)" stroke-width="22"
          stroke-dasharray="${dashPrime} ${(C-dashPrime).toFixed(1)}" transform="rotate(-90 80 80)"/>
        <circle cx="80" cy="80" r="62" fill="none" stroke="var(--azul-actinver)" stroke-width="22"
          stroke-dasharray="${dashPlus} ${(C-dashPlus).toFixed(1)}" stroke-dashoffset="${offsetPlus}" transform="rotate(-90 80 80)"/>
      </svg>
      <div class="donut-center">
        <div class="donut-num">${total}</div>
        <div class="donut-lbl">miembros</div>
      </div>
    </div>
    <div class="donut-legend">
      <div class="donut-legend-item">
        <div class="donut-legend-dot" style="background:var(--azul-actinver)"></div>
        <div class="donut-legend-num">${d.plus}</div>
        <div class="donut-legend-lbl">Plus · ${fmt.pct0(pPlus)}</div>
      </div>
      <div class="donut-legend-item">
        <div class="donut-legend-dot" style="background:var(--sunset)"></div>
        <div class="donut-legend-num">${d.prime}</div>
        <div class="donut-legend-lbl">Prime · ${fmt.pct0(pPrime)}</div>
      </div>
    </div>
  </div>`;
}

function renderEdad(d){
  const buckets = ['<20','20-29','30-39','40-49','50-59','60-65','66-69','70+'];
  // Find max para escalar barras
  let maxBar = 0;
  buckets.forEach(b => {
    const e = d.edad[b];
    maxBar = Math.max(maxBar, e.plus, e.prime);
  });
  if(maxBar === 0) maxBar = 1;

  const half1 = buckets.slice(0,4);
  const half2 = buckets.slice(4);
  let dominant = buckets[0];
  let dominantTotal = 0;
  buckets.forEach(b => {
    if(d.edad[b].total > dominantTotal){ dominantTotal = d.edad[b].total; dominant = b; }
  });
  const totalAll = buckets.reduce((s,b)=>s+d.edad[b].total,0);
  const dominantPct = totalAll ? dominantTotal/totalAll : 0;

  function rowHTML(b){
    const e = d.edad[b];
    const wPlus = (e.plus/maxBar)*100;
    const wPrime = (e.prime/maxBar)*100;
    return `<div class="age-row">
      <div class="age-lbl">${b}</div>
      <div class="age-bars">
        <div class="age-plus" style="width:${wPlus}%"></div>
        <div class="age-prime" style="width:${wPrime}%"></div>
      </div>
      <div class="age-total">${e.total}</div>
    </div>`;
  }

  let h = `<div class="panel">
    <div class="age-legend">
      <div class="age-legend-item"><span class="age-legend-dot" style="background:var(--azul-actinver)"></span>Plus</div>
      <div class="age-legend-item"><span class="age-legend-dot" style="background:rgba(201,168,103,0.7)"></span>Prime</div>
    </div>
    <div class="age-grid">
      <div>${half1.map(rowHTML).join('')}</div>
      <div>${half2.map(rowHTML).join('')}</div>
    </div>
    <div class="age-footer">
      <span>Rango dominante: <strong>${dominant} años (${fmt.pct0(dominantPct)})</strong></span>
      <span>Total miembros: <span class="gold">${totalAll}</span></span>
      <span>Clientes ≥1 mes: <span class="gold">${d.cli_1mes} / ${d.cobrados}</span></span>
    </div>
  </div>`;
  return h;
}

// ==================== RENTABILIDAD DEL CLUB ====================
function renderRentabilidad(){
  const y25 = RENT['2025'];
  const y26 = RENT['2026'];
  const t25 = y25.Total;
  const t26 = y26.Total;

  // Variaciones clave
  const utope_g = (t26.utope / t25.utope - 1);   // +98.8%
  const margen_pp = (t26.margen - t25.margen);   // +16pp
  const ing_g = (t26.ing_total / t25.ing_total - 1);

  // Shares del UTOPE 2026
  const share_plus = y26.Plus.utope / t26.utope;
  const share_prime = y26.Prime.utope / t26.utope;

  // UTOPE por cliente
  const upc_plus = y26.Plus.utope / y26.Plus.clientes;
  const upc_prime = y26.Prime.utope / y26.Prime.clientes;

  // Max para la cascada (escalar barras)
  const cmax = t26.ing_total;

  let html = '<div class="rent-layout">';

  // BLOQUE 1: HERO (UTOPE total)
  html += `<div class="rent-hero">
    <div>
      <div class="rent-hero-label">UTOPE ACUMULADO · 2026 (1Q)</div>
      <div class="rent-hero-val">${fmt.$(t26.utope)}</div>
      <div class="rent-hero-sub">Utilidad Operativa · ${t26.clientes} miembros</div>
      <div class="rent-hero-delta">▲ +${(utope_g*100).toFixed(1)}% vs 2025 (4Q) (${fmt.$(t25.utope)})</div>
    </div>
    <div class="rent-hero-margin">
      <span class="rent-hero-margin-lbl">Margen operativo</span>
      <span class="rent-hero-margin-val">${fmt.pct(t26.margen)} <span style="font-size:11px;color:var(--good);font-weight:700;margin-left:4px">+${(margen_pp*100).toFixed(1)}pp</span></span>
    </div>
  </div>`;

  // BLOQUE 2: CASCADA Ingreso → Gasto → UTOPE
  html += `<div class="rent-cascade">
    <div class="rent-cascade-title">CASCADA DE <span class="accent">RENTABILIDAD 2026 (1Q)</span></div>
    <div class="cascade-row">
      <div class="cascade-lbl">Ingreso Total</div>
      <div class="cascade-track"><div class="cascade-fill ingreso" style="width:${t26.ing_total/cmax*100}%">${fmt.$(t26.ing_total)}</div></div>
    </div>
    <div class="cascade-row">
      <div class="cascade-lbl" style="padding-left:12px;color:var(--text-mut)">↳ Cuota</div>
      <div class="cascade-track"><div class="cascade-fill ingreso" style="width:${t26.cuota/cmax*100}%;opacity:0.7">${fmt.$(t26.cuota)}</div></div>
    </div>
    <div class="cascade-row">
      <div class="cascade-lbl" style="padding-left:12px;color:var(--text-mut)">↳ Productos</div>
      <div class="cascade-track"><div class="cascade-fill ingreso" style="width:${t26.ing_prod/cmax*100}%;opacity:0.7">${fmt.$(t26.ing_prod)}</div></div>
    </div>
    <div class="cascade-row" style="margin-top:14px">
      <div class="cascade-lbl">− Gasto Total</div>
      <div class="cascade-track"><div class="cascade-fill gasto" style="width:${t26.gasto_total/cmax*100}%">${fmt.$(t26.gasto_total)}</div></div>
    </div>
    <div class="cascade-row" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">
      <div class="cascade-lbl" style="color:var(--sunset);font-weight:700">= UTOPE</div>
      <div class="cascade-track"><div class="cascade-fill utope" style="width:${t26.utope/cmax*100}%">${fmt.$(t26.utope)}</div></div>
    </div>
    <div style="margin-top:10px;font-size:10.5px;color:var(--text-mut);text-align:right;font-family:'Poppins',sans-serif">
      Ingresos +${(ing_g*100).toFixed(1)}% · Gastos solo +${((t26.gasto_total/t25.gasto_total-1)*100).toFixed(1)}% → <span class="gold">Apalancamiento operativo</span>
    </div>
  </div>`;

  // BLOQUE 3: Plus vs Prime
  html += `<div class="rent-tiers">
    <div class="rent-tiers-title">APORTE POR <span class="accent">NIVEL</span></div>
    <div class="tier-card plus">
      <div class="tier-card-head">
        <div class="tier-card-name">Plus · ${y26.Plus.clientes} clientes</div>
        <div class="tier-card-share">${fmt.pct0(share_plus)} del UTOPE</div>
      </div>
      <div class="tier-card-utope">${fmt.$(y26.Plus.utope)}</div>
      <div class="tier-card-meta">
        <span>UTOPE/cliente: <strong>${fmt.$(upc_plus)}</strong></span>
        <span>Margen: <strong>${fmt.pct(y26.Plus.margen)}</strong></span>
      </div>
    </div>
    <div class="tier-card prime">
      <div class="tier-card-head">
        <div class="tier-card-name">Prime · ${y26.Prime.clientes} clientes</div>
        <div class="tier-card-share">${fmt.pct0(share_prime)} del UTOPE</div>
      </div>
      <div class="tier-card-utope">${fmt.$(y26.Prime.utope)}</div>
      <div class="tier-card-meta">
        <span>UTOPE/cliente: <strong>${fmt.$(upc_prime)}</strong></span>
        <span>Margen: <strong>${fmt.pct(y26.Prime.margen)}</strong></span>
      </div>
    </div>
  </div>`;

  html += '</div>'; // /rent-layout

  // TABLA COMPARATIVA 2025 vs 2026
  function deltaCell(v26, v25, isPct=false){
    if(isPct){
      const d = (v26 - v25) * 100;
      const cls = d > 0.01 ? 'delta-up' : d < -0.01 ? 'delta-down' : 'delta-flat';
      const sign = d > 0 ? '+' : '';
      return `<td class="num ${cls}">${sign}${d.toFixed(1)}pp</td>`;
    }
    if(!v25) return `<td class="num delta-flat">—</td>`;
    const pct = (v26/v25 - 1)*100;
    const cls = pct > 0.1 ? 'delta-up' : pct < -0.1 ? 'delta-down' : 'delta-flat';
    const sign = pct > 0 ? '+' : '';
    return `<td class="num ${cls}">${sign}${pct.toFixed(1)}%</td>`;
  }

  function tierRows(tier){
    const a = y25[tier]; const b = y26[tier];
    const pct25 = a.margen; const pct26 = b.margen;
    return `
      <tr><td class="lbl">Clientes</td><td class="num">${a.clientes}</td><td class="num">${b.clientes}</td>${deltaCell(b.clientes, a.clientes)}</tr>
      <tr><td class="lbl">Ingreso por cuota</td><td class="num">${fmt.$(a.cuota)}</td><td class="num">${fmt.$(b.cuota)}</td>${deltaCell(b.cuota, a.cuota)}</tr>
      <tr><td class="lbl">Ingreso por productos</td><td class="num">${fmt.$(a.ing_prod)}</td><td class="num">${fmt.$(b.ing_prod)}</td>${deltaCell(b.ing_prod, a.ing_prod)}</tr>
      <tr><td class="lbl">Ingreso total</td><td class="num">${fmt.$(a.ing_total)}</td><td class="num">${fmt.$(b.ing_total)}</td>${deltaCell(b.ing_total, a.ing_total)}</tr>
      <tr><td class="lbl">Gasto total</td><td class="num">${fmt.$(a.gasto_total)}</td><td class="num">${fmt.$(b.gasto_total)}</td>${deltaCell(b.gasto_total, a.gasto_total)}</tr>
      <tr class="totals"><td class="lbl"><strong>UTOPE</strong></td><td class="num">${fmt.$(a.utope)}</td><td class="num">${fmt.$(b.utope)}</td>${deltaCell(b.utope, a.utope)}</tr>
      <tr><td class="lbl">Margen operativo</td><td class="num">${fmt.pct(a.margen)}</td><td class="num">${fmt.pct(b.margen)}</td>${deltaCell(pct26, pct25, true)}</tr>
    `;
  }

  html += `<div class="rent-compare">
    <table class="rent-compare-table">
      <thead>
        <tr><th>Concepto</th><th class="num">2025 (4Q)</th><th class="num">2026 (1Q)</th><th class="num">Δ %</th></tr>
      </thead>
      <tbody>
        <tr class="section-head"><td colspan="4">▸ Total</td></tr>
        ${tierRows('Total')}
        <tr class="section-head"><td colspan="4">▸ Plus</td></tr>
        ${tierRows('Plus')}
        <tr class="section-head"><td colspan="4">▸ Prime</td></tr>
        ${tierRows('Prime')}
      </tbody>
    </table>
  </div>`;

  // Nota al pie sobre el universo
  html += `<div class="rent-note">
    <strong>Nota:</strong> La rentabilidad se calcula sobre el universo cerrado de <strong>${t26.clientes} clientes</strong> considerados en el modelo financiero (cohorte original del club). Los ${177 - t26.clientes} miembros adicionales del Laboratorio 2.0 (Feb–Abr 2026) se integrarán al cierre del piloto.
  </div>`;

  return html;
}

    ['Banca Móvil activada', `${d.comercial.banca} (${fmt.pct0(pct(d.comercial.banca,d.cobrados))})`],
    ['TDD activada', `${d.comercial.tdd} (${fmt.pct0(pct(d.comercial.tdd,d.cobrados))})`],
    ['Entrega Divisa Flex', `${d.onboarding.entrega_df}/${d.onboarding.gestion_df} (${fmt.pct0(pct(d.onboarding.entrega_df,d.onboarding.gestion_df))})`],
    ['Cuenta Eje', `${d.back_office.cuenta_eje} (${fmt.pct0(pct(d.back_office.cuenta_eje,d.cobrados))})`],
    ['Saldo CE > $25K', d.uso.saldo_25k],
  ];
  rows.forEach(([l,v]) => {
    h += `<div class="sxs-row"><span class="sxs-row-label">${l}</span><span class="sxs-row-value">${v}</span></div>`;
  });
  h += '</div>';
  return h;
}

function renderSxSAsesores(mes){
  const d = DATA[mes];
  const partial = PARTIAL_MONTHS.includes(mes);
  let h = `<div class="sxs-col">
    <div class="sxs-col-header">
      <div class="sxs-month">${MONTH_LABEL[mes].toUpperCase()} <span class="accent">2026</span> ${partial?'<span style="color:var(--warn);font-size:9px;margin-left:6px">⚠ EN CURSO</span>':''}</div>
      <div class="sxs-meta">${ASESORES.length} asesores</div>
    </div>
    <table class="kpi-table" style="margin-top:-4px">
      <thead><tr><th>Asesor</th><th class="num">Cobr.</th><th class="num">Ingreso</th><th class="num">Avance</th></tr></thead><tbody>`;
  ASESORES.forEach(a => {
    const ad = d.asesores[a];
    const avance = pct(ad.cobrados, META_MES);
    h += `<tr>
      <td>${a}</td>
      <td class="num">${ad.cobrados}</td>
      <td class="num">${fmt.$(ad.ingreso)}</td>
      <td class="num">${fmt.pct0(avance)}</td>
    </tr>`;
  });
  h += '</tbody></table></div>';
  return h;
}

// ==================== RENDER: OVERLAY (DELTAS) ====================
function renderOverlay(mesA, mesB){
  const dA = DATA[mesA];
  const dB = DATA[mesB];
  const partialA = PARTIAL_MONTHS.includes(mesA);
  const idxA = MONTHS.indexOf(mesA);

  let html = '<div class="fade">';
  html += `<div class="section"><div class="section-title"><span class="section-num">Δ</span>${MONTH_LABEL[mesA].toUpperCase()} 2026 ${partialA?'<span style="color:var(--warn);font-size:10px;font-family:Poppins">(EN CURSO)</span> ':''}<span class="section-title-accent">VS</span> ${MONTH_LABEL[mesB].toUpperCase()} 2026 (BASE)</div>`;

  // KPI cards with deltas — KPIs principales del HTML de referencia
  const kpis = [
    {label:'Miembros Cobrados', curr:dA.cobrados, prev:dB.cobrados, fmt:'n', path:['cobrados']},
    {label:'Conversión Global', curr:dA.conversion, prev:dB.conversion, fmt:'pct0', isPct:true, path:['conversion']},
    {label:'Clientes ≥ 1 Mes', curr:dA.cli_1mes, prev:dB.cli_1mes, fmt:'n', path:['cli_1mes']},
    {label:'Tasa Activación', curr:dA.tasa_activacion, prev:dB.tasa_activacion, fmt:'pct0', isPct:true, path:['tasa_activacion']},
    {label:'Ingresos del Mes', curr:dA.ingresos_total, prev:dB.ingresos_total, fmt:'$', isCurrency:true, path:['ingresos_total']},
  ];
  html += '<div class="kpi-grid">';
  kpis.forEach(k => {
    let valStr, baseStr;
    if(k.fmt === '$'){ valStr = fmt.$(k.curr); baseStr = fmt.$(k.prev); }
    else if(k.fmt === 'pct'){ valStr = fmt.pct(k.curr); baseStr = fmt.pct(k.prev); }
    else if(k.fmt === 'pct0'){ valStr = fmt.pct0(k.curr); baseStr = fmt.pct0(k.prev); }
    else { valStr = fmt.n(k.curr); baseStr = fmt.n(k.prev); }
    const trend = trendValues(k.path);
    html += `<div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${valStr}</div>
      <div class="kpi-sub">vs ${baseStr} en ${MONTH_LABEL[mesB]}</div>
      ${deltaHTML(k.curr, k.prev, k.isPct, k.isCurrency)}
      ${sparkline(trend, idxA)}
    </div>`;
  });
  html += '</div></div>';

  // Comparison table — funnel
  html += '<div class="section"><div class="section-title"><span class="section-num">Δ</span>FUNNEL DE BENEFICIOS · <span class="section-title-accent">VARIACIÓN</span></div>';
  html += '<div class="panel"><table class="kpi-table">';
  html += `<thead><tr><th>Beneficio</th><th class="num">${MONTH_SHORT[mesA]}</th><th class="num">${MONTH_SHORT[mesB]}</th><th class="num">Δ Absoluto</th><th class="num">Δ %</th></tr></thead><tbody>`;
  const benefRows = [
    ['Welcome Kit', dA.onboarding.welcome, dB.onboarding.welcome],
    ['Llamada Onboarding', dA.onboarding.llamada, dB.onboarding.llamada],
    ['Gestión Divisa Flex', dA.onboarding.gestion_df, dB.onboarding.gestion_df],
    ['Entrega Divisa Flex', dA.onboarding.entrega_df, dB.onboarding.entrega_df],
    ['Banca Móvil', dA.comercial.banca, dB.comercial.banca],
    ['TDD activada', dA.comercial.tdd, dB.comercial.tdd],
    ['Cuenta Eje', dA.back_office.cuenta_eje, dB.back_office.cuenta_eje],
    ['Gestión Seguro PF', dA.back_office.seguro_pf, dB.back_office.seguro_pf],
    ['Sports World', dA.back_office.sports, dB.back_office.sports],
    ['Entrega Acciones', dA.back_office.acciones, dB.back_office.acciones],
  ];
  benefRows.forEach(([l,a,b]) => {
    const dlt = a-b;
    const dpct = b ? (dlt/b*100) : 0;
    const cls = dlt>0?'good':dlt<0?'bad':'';
    const arrow = dlt>0?'▲':dlt<0?'▼':'●';
    const color = cls==='good'?'var(--good)':cls==='bad'?'var(--bad)':'rgba(255,255,255,0.5)';
    html += `<tr>
      <td>${l}</td>
      <td class="num">${a}</td>
      <td class="num">${b}</td>
      <td class="num" style="color:${color}">${arrow} ${dlt>0?'+':''}${dlt}</td>
      <td class="num" style="color:${color}">${b?(dpct>0?'+':'')+dpct.toFixed(1)+'%':'—'}</td>
    </tr>`;
  });
  html += '</tbody></table></div></div>';

  html += '</div>';
  return html;
}

// ==================== STATE & WIRING ====================
let state = { mode: 'single', single: 'marzo', monthA: 'marzo', monthB: 'febrero' };

function render(){
  const content = document.getElementById('content');
  const footerNote = document.getElementById('footerNote');
  const partialBadge = document.getElementById('partialBadge');
  const singleCtrl = document.getElementById('singleCtrl');
  const compareCtrl = document.getElementById('compareCtrl');

  // Toggle controls
  if(state.mode === 'single'){
    singleCtrl.classList.remove('hide');
    compareCtrl.classList.remove('show');
  } else {
    singleCtrl.classList.add('hide');
    compareCtrl.classList.add('show');
  }

  // Partial badge (también cuando acumulado, porque incluye abril)
  const singleIsPartial = state.mode === 'single' && (PARTIAL_MONTHS.includes(state.single) || isAcum(state.single));
  if(singleIsPartial){
    partialBadge.classList.add('show');
    partialBadge.textContent = isAcum(state.single) ? 'INCLUYE MES EN CURSO' : 'EN CURSO';
  } else {
    partialBadge.classList.remove('show');
  }

  // Footer note
  let needsNote = false;
  if(state.mode === 'single' && (PARTIAL_MONTHS.includes(state.single) || isAcum(state.single))) needsNote = true;
  if(state.mode !== 'single' && (PARTIAL_MONTHS.includes(state.monthA) || PARTIAL_MONTHS.includes(state.monthB))) needsNote = true;
  footerNote.textContent = needsNote ? '⚠ Abril 2026 es un mes en curso — los datos de onboarding y activación pueden ser parciales para cobros recientes.' : '';

  // Render
  if(state.mode === 'single') content.innerHTML = renderSingle(state.single);
  else if(state.mode === 'sxs') content.innerHTML = renderSxS(state.monthA, state.monthB);
  else content.innerHTML = renderOverlay(state.monthA, state.monthB);
}

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', e => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mode = tab.dataset.mode;
    render();
  });
});

document.getElementById('monthSingle').addEventListener('change', e => {
  state.single = e.target.value;
  render();
});
document.getElementById('monthA').addEventListener('change', e => {
  state.monthA = e.target.value;
  render();
});
document.getElementById('monthB').addEventListener('change', e => {
  state.monthB = e.target.value;
  render();
});

render();
</script>
